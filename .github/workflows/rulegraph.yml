name: Update rulegraph

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'config/**'
      - 'Snakefile'
      - 'rules/**'
      - '.github/workflows/rulegraph.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: smk
          cache-environment: true
          create-args: >-
            python=3.11
            snakemake-minimal
            graphviz
            pandas

      - name: Render rulegraph
        shell: bash -el {0}
        run: |
          mkdir -p .github/assets
          snakemake --snakefile workflow/Snakefile --rulegraph \
            | dot -Tsvg > .github/assets/rulegraph.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/rulegraph.svg
          if git diff --cached --quiet; then
            echo "No change in rulegraph."
          else
            git commit -m "ci: update rulegraph [skip ci]"
            git push
          fi
