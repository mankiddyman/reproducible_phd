name: Update rulegraph
on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'config/**'
      - 'Snakefile'
      - 'rules/**'
      - '.github/workflows/rulegraph.yml'
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Install snakemake
        run: pip install snakemake pandas
      - name: Create placeholder FASTQs for CI
        run: |
          mkdir -p .ci/fastqs
          touch .ci/fastqs/paradoxa.fastq.gz
          touch .ci/fastqs/binata.fastq.gz
          touch .ci/fastqs/roseana.fastq.gz
      - name: Render rulegraph
        run: |
          mkdir -p .github/assets
          snakemake --snakefile workflow/Snakefile --rulegraph \
            --config species_table=config/species.ci.csv \
            | dot -Tsvg > .github/assets/rulegraph.svg
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .github/assets/rulegraph.svg
          if git diff --cached --quiet; then
            echo "No change in rulegraph."
          else
            git commit -m "ci: update rulegraph [skip ci]"
            git push
          fi
