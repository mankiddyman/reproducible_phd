name: Update rulegraph

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'config/**'
      - 'Snakefile'
      - 'rules/**'
      - '.github/workflows/rulegraph.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install snakemake
        run: pip install snakemake pandas

      - name: List rules
        id: rules
        shell: bash {0}
        run: |
          echo "=== running snakemake --list ==="
          snakemake --snakefile workflow/Snakefile --list > /tmp/list.stdout 2> /tmp/list.stderr
          echo "exit code: $?"
          echo "=== stdout ==="
          cat /tmp/list.stdout
          echo "=== stderr ==="
          cat /tmp/list.stderr
          echo "=== extracted rule names ==="
          grep -v '^$' /tmp/list.stdout | grep -v 'Building DAG' > /tmp/rules.txt || true
          cat /tmp/rules.txt
          RULES=$(tr '\n' ' ' < /tmp/rules.txt)
          echo "rules=$RULES" >> $GITHUB_OUTPUT

      - name: Render rulegraph to DOT
        shell: bash {0}
        run: |
          mkdir -p .github/assets
          snakemake --snakefile workflow/Snakefile --rulegraph ${{ steps.rules.outputs.rules }} \
            > /tmp/rulegraph.dot 2> /tmp/rulegraph.err
          echo "exit code: $?"
          echo "=== DOT output ==="
          cat /tmp/rulegraph.dot
          echo "=== stderr ==="
          cat /tmp/rulegraph.err

      - name: Convert DOT to SVG
        run: |
          dot -Tsvg /tmp/rulegraph.dot > .github/assets/rulegraph.svg
          echo "=== SVG size ==="
          wc -c .github/assets/rulegraph.svg
          echo "=== SVG head ==="
          head -c 500 .github/assets/rulegraph.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .github/assets/rulegraph.svg
          if git diff --cached --quiet; then
            echo "No change in rulegraph."
          else
            git commit -m "ci: update rulegraph [skip ci]"
            git push
          fi
