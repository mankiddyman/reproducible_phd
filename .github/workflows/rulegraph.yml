name: Update rulegraph
on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'config/**'
      - 'Snakefile'
      - 'rules/**'
      - '.github/workflows/rulegraph.yml'
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Install snakemake
        run: pip install snakemake pandas
      - name: Create placeholder inputs for CI
        run: |
          mkdir -p .ci/fastqs
          touch .ci/fastqs/paradoxa.fastq.gz
          touch .ci/fastqs/binata.fastq.gz
          touch .ci/fastqs/roseana.fastq.gz
          mkdir -p resources/external/genomescope2.0
          touch resources/external/genomescope2.0/genomescope.R
          touch resources/external/genomescope2.0/install.R
      - name: Render rulegraph
        run: |
          set -euo pipefail
          mkdir -p .github/assets
          snakemake --snakefile workflow/Snakefile --rulegraph \
            --config species_table=config/species.ci.csv \
            > /tmp/rulegraph.dot
          dot -Tsvg /tmp/rulegraph.dot > .github/assets/rulegraph.svg
          test -s .github/assets/rulegraph.svg
      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Snakemake dot output ==="
          cat /tmp/rulegraph.dot 2>/dev/null || echo "(no dot file)"
          echo "=== SVG file state ==="
          ls -la .github/assets/rulegraph.svg 2>/dev/null || echo "(no svg)"
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .github/assets/rulegraph.svg
          if git diff --cached --quiet; then
            echo "No change in rulegraph."
          else
            git commit -m "ci: update rulegraph [skip ci]"
            git push
          fi
