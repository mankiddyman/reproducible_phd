name: Update rulegraph

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'config/**'
      - 'Snakefile'
      - 'rules/**'
      - '.github/workflows/rulegraph.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install snakemake
        run: pip install snakemake pandas

      - name: Debug + render rulegraph
        run: |
          mkdir -p .github/assets
          echo "=== repo layout ==="
          ls -la
          echo "=== config dir ==="
          ls -la config/ || true
          echo "=== species.csv head ==="
          head config/species.csv || true
          echo "=== workflow dir ==="
          ls -la workflow/
          echo "=== Snakefile ==="
          cat workflow/Snakefile
          echo "=== rules dir ==="
          ls -la workflow/rules/ 2>/dev/null || echo "no workflow/rules"
          echo "=== rulegraph output (text) ==="
          snakemake --snakefile workflow/Snakefile --rulegraph
          echo "=== rendering SVG ==="
          snakemake --snakefile workflow/Snakefile --rulegraph \
            | dot -Tsvg > .github/assets/rulegraph.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .github/assets/rulegraph.svg
          if git diff --cached --quiet; then
            echo "No change in rulegraph."
          else
            git commit -m "ci: update rulegraph [skip ci]"
            git push
          fi
